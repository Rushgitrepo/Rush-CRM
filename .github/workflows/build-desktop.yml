name: Build Desktop Apps

on:
  push:
    branches: [main, desktop-build]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    env:
      PUBLISH_FLAG: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'always' || 'never' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies (Root)
        run: npm install

      - name: Install dependencies (Frontend)
        run: |
          cd frontend
          npm install

      - name: Install dependencies (Backend)
        run: |
          cd backend
          npm install

      - name: Install dependencies (Electron)
        run: |
          cd electron
          npm install

      - name: Build Frontend
        run: npm run build:frontend

      - name: Build Electron App (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd electron
          npx electron-builder --win --publish ${{ env.PUBLISH_FLAG }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron App (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd electron
          npx electron-builder --mac --publish ${{ env.PUBLISH_FLAG }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron App (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd electron
          npx electron-builder --linux --publish never
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: rush-crm-windows
          path: |
            electron/dist/*.exe
            electron/dist/latest.yml

      - name: Upload macOS Artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: rush-crm-macos
          path: |
            electron/dist/*.dmg
            electron/dist/*.zip
            electron/dist/latest-mac.yml
            electron/dist/*-mac.zip

      - name: Upload Linux Artifacts
        if: matrix.os == 'ubuntu-latest' && success()
        uses: actions/upload-artifact@v4
        with:
          name: rush-crm-linux
          path: |
            electron/dist/*.AppImage
            electron/dist/*.deb
